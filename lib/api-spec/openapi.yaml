openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ClassMind - Smart Academic Assistant API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: events
    description: Academic events
  - name: courses
    description: Google Classroom courses
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /courses:
    get:
      operationId: listCourses
      tags: [courses]
      summary: List Google Classroom courses for current user
      responses:
        "200":
          description: List of courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Course"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /courses/sync:
    post:
      operationId: syncClassroom
      tags: [courses]
      summary: Fetch announcements from Classroom, process with AI, and save events
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResult"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List all extracted academic events for current user
      parameters:
        - name: event_type
          in: query
          schema:
            type: string
        - name: course_id
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of academic events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AcademicEvent"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /events/upcoming:
    get:
      operationId: getUpcomingEvents
      tags: [events]
      summary: Get upcoming events in the next 14 days
      responses:
        "200":
          description: Upcoming events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AcademicEvent"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /events/summary:
    get:
      operationId: getEventsSummary
      tags: [events]
      summary: Get event counts grouped by type
      responses:
        "200":
          description: Event summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventsSummary"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /events/{id}:
    delete:
      operationId: deleteEvent
      tags: [events]
      summary: Delete an academic event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /events/{id}/calendar:
    post:
      operationId: syncEventToCalendar
      tags: [events]
      summary: Sync a specific event to Google Calendar
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Calendar event created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarSyncResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    User:
      type: object
      required: [id, email, name]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        picture:
          type: ["string", "null"]

    Course:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        section:
          type: ["string", "null"]
        room:
          type: ["string", "null"]

    AcademicEvent:
      type: object
      required: [id, userId, courseId, courseName, eventType, rawText, confidence, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        courseId:
          type: string
        courseName:
          type: string
        eventType:
          type: string
        eventDate:
          type: ["string", "null"]
        rawText:
          type: string
        confidence:
          type: number
        calendarEventId:
          type: ["string", "null"]
        createdAt:
          type: string

    SyncResult:
      type: object
      required: [coursesProcessed, announcementsFound, eventsExtracted, calendarSynced]
      properties:
        coursesProcessed:
          type: integer
        announcementsFound:
          type: integer
        eventsExtracted:
          type: integer
        calendarSynced:
          type: integer

    EventsSummary:
      type: object
      required: [total, byType, withDates]
      properties:
        total:
          type: integer
        byType:
          type: array
          items:
            $ref: "#/components/schemas/EventTypeCount"
        withDates:
          type: integer

    EventTypeCount:
      type: object
      required: [eventType, count]
      properties:
        eventType:
          type: string
        count:
          type: integer

    CalendarSyncResult:
      type: object
      required: [success, calendarEventId]
      properties:
        success:
          type: boolean
        calendarEventId:
          type: string
